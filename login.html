<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login DARKCHAN</title>
  <style>
    body {
      /* Caminho correto para a imagem dentro da pasta img */
      background: black url("./img/dedsec.jpeg") no-repeat center center fixed; 
      background-size: cover;
      color:red; font-family:'Orbitron', sans-serif;
      overflow:hidden;
      animation: glitch-bg 0.3s infinite alternate;
      box-shadow: inset 0 0 40px red; /* neon ao redor */
    }
    .login-container {
      display:flex; justify-content:center; align-items:center; height:100vh;
    }
    .login-box {
      background:rgba(17,17,17,0.85); padding:30px; border:3px solid red; text-align:center;
      box-shadow:0 0 25px red, inset 0 0 15px #ff0000;
    }
    .login-box h1 {
      font-size:2em;
      text-shadow:0 0 15px red, 0 0 30px #ff0000;
      animation: pulse 0.4s infinite alternate, glitch-text-fast 0.05s infinite;
    }
    .login-box input {
      display:block; margin:10px auto; padding:10px; width:90%;
      border:1px solid red; background:black; color:white;
      box-shadow:0 0 10px red;
    }
    .login-box button {
      background:red; color:black; padding:10px 20px; border:none;
      cursor:pointer; font-weight:bold; margin:5px;
      animation: blink 0.2s infinite alternate;
      box-shadow:0 0 15px red;
    }
    canvas { display:block; margin:10px auto; border:1px solid red; }

    /* Animações */
    @keyframes blink { from {opacity:1;} to {opacity:0.2;} }
    @keyframes pulse { from {text-shadow:0 0 5px red;} to {text-shadow:0 0 25px #ff0000;} }
    @keyframes glitch-bg { from {background-color:black;} to {background-color:#0a0a0a;} }
    @keyframes glitch-text-fast {
      0% { transform:translate(0,0); }
      20% { transform:translate(-2px,1px); }
      40% { transform:translate(2px,-1px); }
      60% { transform:translate(-1px,2px); }
      80% { transform:translate(1px,-2px); }
      100% { transform:translate(0,0); }
    }
  </style>
</head>
<body>
  <div class="login-container" id="login">
    <div class="login-box">
      <h1>DARKCHAN</h1>
      <input type="text" id="username" placeholder="Usuário">
      <input type="password" id="password" placeholder="Senha">
      <canvas id="captchaCanvas" width="200" height="70"></canvas>
      <input type="text" id="captchaInput" placeholder="Digite o código acima">
      <button onclick="login()">Entrar</button>
      <button onclick="generateCaptcha()">Atualizar CAPTCHA</button>
    </div>
  </div>

  <script>
    let captchaCode = "";

    function generateCaptcha() {
      const canvas = document.getElementById("captchaCanvas");
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      captchaCode = "";
      for (let i = 0; i < 6; i++) {
        captchaCode += chars.charAt(Math.floor(Math.random() * chars.length));
      }

      ctx.font = "bold 32px Orbitron";
      ctx.fillStyle = "red";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(255,0,0,0.7)";
      ctx.shadowBlur = 4;
      ctx.fillText(captchaCode, canvas.width/2, canvas.height/2);
    }

    function login() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      const captchaInput = document.getElementById("captchaInput").value.trim().toUpperCase();

      if (!user || !pass) {
        alert("Preencha usuário e senha!");
        return;
      }
      if (captchaInput !== captchaCode) {
        alert("CAPTCHA incorreto!");
        generateCaptcha();
        return;
      }

      window.location.href = "/forum";
    }

    window.onload = generateCaptcha;
  </script>
</body>
</html>
