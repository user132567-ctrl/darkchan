<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Fórum DARKCHAN</title>
  <style>
    body {
      background: black url("./img/dedsec.jpeg") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Orbitron', sans-serif;
      color: #00ff00;
      margin: 0;
      padding: 0;
      cursor: crosshair;
      position: relative;
      overflow-x: hidden;
    }

    /* Scanline effect */
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,0,0,0.05),
        rgba(0,0,0,0.05) 2px,
        transparent 4px
      );
      pointer-events: none;
      animation: flicker 2s infinite;
    }

    header {
      background: rgba(0,0,0,0.85);
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid red;
      box-shadow: 0 0 15px red;
    }

    header h1 {
      font-size: 2.5em;
      color: #00ff00;
      text-shadow: 0 0 10px red, 0 0 20px #ff0000;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid red;
      animation: typing 3s steps(20, end), blinkCursor 0.7s infinite;
    }

    nav {
      background: rgba(20,20,20,0.9);
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid red;
    }

    nav a {
      color: #00ff00;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      transition: color 0.3s, text-shadow 0.3s;
    }

    nav a:hover {
      color: red;
      text-shadow: 0 0 10px red;
    }

    .forum-container {
      max-width: 900px;
      margin: 30px auto;
      background: rgba(0,0,0,0.85);
      padding: 20px;
      border: 2px solid red;
      box-shadow: 0 0 20px red;
      animation: fadeIn 1s ease-in;
    }

    .post {
      border-bottom: 1px solid #333;
      padding: 15px 0;
      transition: box-shadow 0.3s, transform 0.3s;
    }

    .post:hover {
      box-shadow: 0 0 15px red;
      transform: scale(1.02);
    }

    .post h2 {
      margin: 0;
      color: red;
      text-shadow: 0 0 10px #ff0000;
    }

    .post p {
      margin: 10px 0;
      color: #00ff00;
    }

    .post small {
      color: gray;
      font-style: italic;
    }

    .new-post {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
      background: rgba(10,10,10,0.9);
      border: 2px solid red;
      box-shadow: 0 0 15px red;
      animation: fadeIn 1.5s ease-in;
    }

    .new-post h2 {
      color: red;
      text-shadow: 0 0 10px #ff0000;
    }

    .new-post input, .new-post textarea {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      background: black;
      border: 1px solid red;
      color: #00ff00;
      font-family: 'Orbitron', sans-serif;
      transition: box-shadow 0.3s;
    }

    .new-post input:focus, .new-post textarea:focus {
      box-shadow: 0 0 10px red;
      outline: none;
    }

    .new-post button {
      background: red;
      color: black;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      animation: pulse 1s infinite alternate;
      margin-top: 10px;
      transition: transform 0.2s;
    }

    .new-post button:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 15px;
      background: rgba(0,0,0,0.8);
      border-top: 2px solid red;
      color: #666;
    }

    /* Sidebar lateral */
    .sidebar {
      position: fixed;
      right: 0;
      top: 0;
      width: 300px;
      height: 100%;
      background: rgba(0,0,0,0.85);
      border-left: 2px solid red;
      box-shadow: -5px 0 15px red;
      overflow-y: auto;
      padding: 20px;
      color: #00ff00;
    }

    .sidebar h2 {
      color: red;
      text-shadow: 0 0 10px #ff0000;
      margin-top: 0;
    }

    .feed-item {
      margin-bottom: 15px;
      padding: 10px;
      border-bottom: 1px solid #333;
      animation: fadeInRight 0.5s ease-in;
    }

    .feed-item strong {
      color: #00ff00;
    }

    /* Animations */
    @keyframes pulse {
      from { opacity: 1; }
      to { opacity: 0.6; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blinkCursor {
      from { border-right-color: red; }
      to { border-right-color: transparent; }
    }

    @keyframes flicker {
      0% { opacity: 0.95; }
      50% { opacity: 1; }
      100% { opacity: 0.95; }
    }

    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Fórum DARKCHAN</h1>
  </header>

  <nav>
    <a href="login.html">Login</a>
    <a href="forum.html">Fórum</a>
    <a href="#">Sobre</a>
  </nav>

  <div class="forum-container" id="forum">
    <!-- Posts carregados do backend -->
  </div>

  <div class="new-post">
    <h2>Criar novo post</h2>
    <input type="text" id="postTitle" placeholder="Título do post">
    <textarea id="postContent" rows="5" placeholder="Escreva sua mensagem..."></textarea>
    <input type="text" id="postAuthor" placeholder="Seu nome">
    <button onclick="addPost()">Publicar</button>
  </div>

  <div class="sidebar" id="sidebar">
    <h2>Últimos Posts</h2>
    <!-- Feed será carregado aqui -->
  </div>

  <footer>
    <p>&copy; 2026 DARKCHAN - Todos os direitos reservados</p>
  </footer>

  <script>
    async function loadPosts() {
      try {
        const response = await fetch('/api/posts');
        const posts = await response.json();
        const forum = document.getElementById("forum");
        const sidebar = document.getElementById("sidebar");

        forum.innerHTML = "";
        sidebar.innerHTML = "<h2>Últimos Posts</h2>";

        posts.forEach(post => {
          // Área principal
          const newPost = document.createElement("div");
          newPost.classList.add("post");
          newPost.innerHTML = `
            <h2>${post.title}</h2>
            <p>${post.content}</p>
            <small>Postado por ${post.author}</small>
          `;
          forum.appendChild(newPost);

          // Feed lateral
          const feedItem = document.createElement("div");
          feedItem.classList.add("feed-item");
          feedItem.innerHTML = `
            <strong>${post.author}</strong>: ${post.title}
          `;
          sidebar.appendChild(feedItem);
        });
      } catch (err) {
        console.error("Erro ao carregar posts:", err);
      }
    }

    async function addPost
    async function addPost() {
      const title = document.getElementById("postTitle").value.trim();
      const content = document.getElementById("postContent").value.trim();
      const author = document.getElementById("postAuthor").value.trim();

      if (!title || !content || !author) {
        alert("Preencha todos os campos!");
        return;
      }

      try {
        await fetch('/api/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content, author })
        });

        // Som discreto ao publicar
        const beep = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
        beep.play();

        loadPosts();

        document.getElementById("postTitle").value = "";
        document.getElementById("postContent").value = "";
        document.getElementById("postAuthor").value = "";
      } catch (err) {
        console.error("Erro ao adicionar post:", err);
      }
    }

    window.onload = loadPosts;
  </script>
</body>
</html>
