<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Fórum DARKCHAN</title>
  <style>
    /* (todo o CSS já mostrado antes, incluindo cursor neon e rastro) */
  </style>
</head>
<body>
  <canvas id="matrixRain"></canvas>
  <div class="cursor" id="cursor"></div>

  <header>
    <h1>Fórum DARKCHAN</h1>
    <button id="fullscreenBtn">⛶</button>
  </header>

  <nav>
    <a href="login.html">Login</a>
    <a href="forum.html">Fórum</a>
    <a href="https://discord.gg/nV94szrjKE" target="_blank">Discord</a>
  </nav>

  <main>
    <div class="forum-container" id="forum"></div>
    <div class="new-post">
      <h2>Criar novo post</h2>
      <input type="text" id="postTitle" placeholder="Título do post">
      <textarea id="postContent" rows="5" placeholder="Escreva sua mensagem..."></textarea>
      <input type="text" id="postAuthor" placeholder="Seu nome">
      <button onclick="addPost()">Publicar</button>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 DARKCHAN - Todos os direitos reservados</p>
  </footer>

  <script>
    async function loadPosts() {
      try {
        const response = await fetch('/api/posts');
        const posts = await response.json();
        const forum = document.getElementById("forum");

        forum.innerHTML = "";

        posts.reverse().forEach(post => {
          const newPost = document.createElement("div");
          newPost.classList.add("post");
          newPost.innerHTML = `
            <h2>${post.title}</h2>
            <p>${post.content}</p>
            <small>Postado por ${post.author}</small>
          `;
          forum.appendChild(newPost);
        });
      } catch (err) {
        console.error("Erro ao carregar posts:", err);
      }
    }

    async function addPost() {
      const title = document.getElementById("postTitle").value.trim();
      const content = document.getElementById("postContent").value.trim();
      const author = document.getElementById("postAuthor").value.trim();

      if (!title || !content || !author) {
        alert("Preencha todos os campos!");
        return;
      }

      try {
        await fetch('/api/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content, author })
        });

        const beep = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
        beep.play();

        loadPosts();

        document.getElementById("postTitle").value = "";
        document.getElementById("postContent").value = "";
        document.getElementById("postAuthor").value = "";
      } catch (err) {
        console.error("Erro ao adicionar post:", err);
      }
    }

    // Botão fullscreen
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    fullscreenBtn.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    });

    window.onload = loadPosts;

    // Matrix Rain em vermelho
    const canvas = document.getElementById("matrixRain");
    const ctx = canvas.getContext("2d");

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&@";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = [];

    for (let x = 0; x < columns; x++) {
      drops[x] = 1;
    }

    function draw() {
      ctx.fillStyle = "rgba(0,0,0,0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "red";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(draw, 33);

    window.addEventListener("resize", () => {
      canvas.height = window.innerHeight;
      canvas.width = window.innerWidth;
    });

    // Cursor neon vermelho pulsante + rastro luminoso
    const cursor = document.getElementById("cursor");
    document.addEventListener("mousemove", e => {
      cursor.style.left = e.pageX + "px";
      cursor.style.top = e.pageY + "px";

      // Criar rastro
      const trail = document.createElement("div");
      trail.classList.add("trail");
      trail.style.left = e.pageX + "px";
      trail.style.top = e.pageY + "px";
      document.body.appendChild(trail);

      // Remover rastro após animação
      setTimeout(() => {
        trail.remove();
      }, 600);
    });
  </script>
</body>
</html>
